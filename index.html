    <script>
      /* Splash flower confetti — lightweight version */
      (function () {
        const canvas = document.getElementById("splash-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const splash = document.getElementById("splash");
        let W = (canvas.width = splash.offsetWidth || window.innerWidth);
        let H = (canvas.height = splash.offsetHeight || window.innerHeight);

        const isMob = /Android|iPhone|iPad|iPod|Mobile/i.test(
          navigator.userAgent,
        );
        const COUNT = isMob ? 12 : 26;

        window.addEventListener(
          "resize",
          () => {
            W = canvas.width = splash.offsetWidth || window.innerWidth;
            H = canvas.height = splash.offsetHeight || window.innerHeight;
          },
          { passive: true },
        );

        const COLS = [
          [255, 200, 60],
          [232, 130, 40],
          [220, 80, 100],
          [255, 150, 80],
          [200, 100, 180],
          [255, 180, 180],
          [255, 210, 100],
        ];
        function spawn(randY) {
          const c = COLS[Math.floor(Math.random() * COLS.length)];
          const nPetals = [4, 5, 6, 8][Math.floor(Math.random() * 4)];
          const size = 5 + Math.random() * 18;
          return {
            x: Math.random() * (W || 400),
            y: randY ? Math.random() * (H || 800) : -30,
            size,
            petals: nPetals,
            rot: Math.random() * Math.PI * 2,
            spinV: 0.008 + Math.random() * 0.03,
            vx: (Math.random() - 0.5) * 0.45,
            vy: 0.55 + Math.random() * 1.4,
            wobble: Math.random() * Math.PI * 2,
            wobbleS: 0.012 + Math.random() * 0.02,
            alpha: 0.55 + Math.random() * 0.25,
            glowT: Math.random() * Math.PI * 2,
            glowS: 0.018 + Math.random() * 0.012,
            r: c[0],
            g: c[1],
            b: c[2],
          };
        }

        const pieces = Array.from({ length: COUNT }, () => spawn(true));
        let animId;

        function draw() {
          ctx.clearRect(0, 0, W, H);
          for (const p of pieces) {
            p.wobble += p.wobbleS;
            p.glowT += p.glowS;
            p.rot += p.spinV;
            p.x += p.vx + Math.sin(p.wobble) * 0.3;
            p.y += p.vy;
            if (p.y > H + 40) Object.assign(p, spawn(false));

            const pulse = p.alpha * (0.7 + 0.3 * Math.sin(p.glowT));
            const step = (Math.PI * 2) / p.petals;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);

            for (let i = 0; i < p.petals; i++) {
              ctx.save();
              ctx.rotate(i * step);
              const g = ctx.createRadialGradient(
                0,
                p.size * 0.35,
                0,
                0,
                p.size * 0.35,
                p.size * 0.7,
              );
              g.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${pulse})`);
              g.addColorStop(0.4, `rgba(${p.r},${p.g},${p.b},${pulse * 0.6})`);
              g.addColorStop(1, `rgba(${p.r},${p.g},${p.b},0)`);
              ctx.beginPath();
              ctx.ellipse(
                0,
                p.size * 0.42,
                p.size * 0.17,
                p.size * 0.45,
                0,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = g;
              ctx.fill();
              ctx.restore();
            }
            const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 0.22);
            cg.addColorStop(0, "rgba(255,255,220,1)");
            cg.addColorStop(0.3, `rgba(255,240,120,${pulse * 0.8})`);
            cg.addColorStop(1, `rgba(${p.r},${p.g},${p.b},0)`);
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = cg;
            ctx.fill();
            ctx.restore();
          }
          animId = requestAnimationFrame(draw);
        }
        draw();

        document.addEventListener("click", () => cancelAnimationFrame(animId), {
          once: true,
        });
      })();

      /* Splash dismiss — navigate to invite page */
      document.addEventListener(
        "click",
        function () {
          const splash = document.getElementById("splash");
          if (!splash) return;
          splash.style.transition = "opacity 0.9s ease";
          splash.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "invite.html";
          }, 900);
        },
        { once: true },
      );
    </script>
